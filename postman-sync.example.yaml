# postman-sync configuration
#
# Secrets can also be set via environment variables:
#   POSTMAN_API_KEY, POSTMAN_WORKSPACE_ID

# Required
postman_api_key: ""        # Postman API key (prefer env var POSTMAN_API_KEY)
workspace_id: ""           # Postman workspace ID (prefer env var POSTMAN_WORKSPACE_ID)

# ── openapi-sync command ──────────────────────────────────────────────────────
# Configuration for: postman-sync openapi-sync
openapi:
  # Input OpenAPI spec path (JSON or YAML)
  path: "./openapi.json"

  # Base URL to set on every request (Postman variable reference recommended)
  base_url: "{{baseUrl}}"

  # Replace enum values with a placeholder to reduce diff noise (default: true)
  sanitize_enums: true

  # Doc links: append a documentation link to each request description.
  # Omit this section entirely to disable doc links.
  # doc_links:
  #   base_url: "https://your.docs.host/#tag/"

  # Common headers injected into every request
  common_headers:
    - key: "X-Tenant"
      value: "{{tenantId}}"
      disabled: false
    - key: "X-App"
      value: "{{appSlug}}"
      disabled: false

  # Collection-level authentication
  auth:
    type: "bearer"           # apikey, basic, bearer, oauth2, noauth, etc.
    attributes:
      - key: "token"
        value: "{{authToken}}"
        type: "string"
    # propagation controls how auth is applied to child folders and requests.
    # When set to "inherit", every folder and request will have its auth cleared
    # so it inherits from its parent (collection or enclosing folder).
    # Items with auth type "noauth" are always left untouched.
    # Folders listed in folder_overrides keep their explicitly configured auth.
    # Omit this field (or leave blank) to preserve the current behaviour.
    # propagation: "inherit"

  # Collection-level scripts
  scripts:
    prerequest: |
      // Collection-level pre-request script
      console.log("Pre-request running");
    test: |
      // Collection-level test script
      pm.test("Status is 2xx", function() {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });

  # Per-folder (tag) overrides for auth and scripts.
  # Folder names correspond to OpenAPI tags.
  # folder_overrides:
  #   "Authentication":
  #     auth:
  #       type: "noauth"
  #     scripts:
  #       prerequest: |
  #         // No pre-request needed
  #       test: |
  #         pm.test("Returns token", function() {
  #           pm.expect(pm.response.json().token).to.exist;
  #         });
  #   "Admin":
  #     auth:
  #       type: "bearer"
  #       attributes:
  #         - key: "token"
  #           value: "{{adminToken}}"
  #           type: "string"

# ── export command ────────────────────────────────────────────────────────────
# Configuration for: postman-sync export
# All settings can be overridden via CLI flags.
export:
  # Directory to write exported files (default: ./postman-export)
  output_dir: "./postman-export"

  # Collections to export: list of names, or ["all"] for everything.
  # Omit or leave empty to skip collections.
  collections:
    - "all"

  # Environments to export: list of names, or ["all"] for everything.
  # Omit or leave empty to skip environments.
  environments:
    - "all"

  # Pretty-print exported JSON (default: true, recommended for git diffs)
  pretty: true

# ── import command ────────────────────────────────────────────────────────────
# Configuration for: postman-sync import
# All settings can be overridden via CLI flags.
import:
  # Directory to read files from (default: ./postman-export)
  input_dir: "./postman-export"

  # Collections to import. Strategy: "overwrite" (default) or "merge".
  # "merge" preserves auth, scripts, and saved responses from the existing
  # Postman collection; request definitions come from the imported file.
  # Omit this section to skip collection import.
  # collections:
  #   names:
  #     - "all"
  #   strategy: "overwrite"

  # Environments to import. Only "overwrite" strategy is supported.
  # Omit this section to skip environment import.
  # environments:
  #   names:
  #     - "all"
  #   strategy: "overwrite"
